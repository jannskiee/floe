allowBuilds:
  '@sentry/cli': true
  esbuild: true
  sharp: true
  unrs-resolver: true

# pnpm 11 reads dependency overrides from this workspace file; the package.json
# "pnpm.overrides" field is ignored once this file exists. Security pins live here.
overrides:
  esbuild: ^0.28.1
  ws: ^8.21.0
  postcss: ^8.5.15
  picomatch@2: ^2.3.2
  picomatch@4: ^4.0.4
  minimatch@3: ^3.1.3
  minimatch@9: ^9.0.7
  socket.io-parser: ^4.2.6
  flatted: ^3.4.2
