name: Container images

on:
    pull_request:
        branches: [main]
        paths:
            - '.github/workflows/containers.yml'
            - 'client/**'
            - 'server/**'
    push:
        branches: [main]
        tags: ['v*']
        paths:
            - '.github/workflows/containers.yml'
            - 'client/**'
            - 'server/**'
    workflow_dispatch:

permissions:
    contents: read
    packages: write

concurrency:
    group: containers-${{ github.ref }}
    cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
    build:
        name: Build ${{ matrix.name }} image
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - name: client
                      context: ./client
                      image: ghcr.io/${{ github.repository_owner }}/floe-client
                    - name: server
                      context: ./server
                      image: ghcr.io/${{ github.repository_owner }}/floe-server

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up QEMU
              if: github.event_name != 'pull_request'
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GitHub Container Registry
              if: github.event_name != 'pull_request'
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Generate image metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ matrix.image }}
                  tags: |
                      type=raw,value=edge,enable={{is_default_branch}}
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
                  labels: |
                      org.opencontainers.image.title=Floe ${{ matrix.name }}
                      org.opencontainers.image.description=Floe self-hosted ${{ matrix.name }}

            - name: Build and publish
              uses: docker/build-push-action@v6
              with:
                  context: ${{ matrix.context }}
                  platforms: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
                  push: ${{ github.event_name != 'pull_request' }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha,scope=${{ matrix.name }}
                  cache-to: type=gha,mode=max,scope=${{ matrix.name }}
