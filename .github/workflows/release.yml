name: Release

# Publishes cross-platform CLI binaries to GitHub Releases when a version tag
# (e.g. v1.0.0) is pushed. Build/archive/checksum config lives in .goreleaser.yml.
# Package manager manifests (Homebrew Cask, Scoop, Winget) are also published
# automatically on each tag using TAP_GITHUB_TOKEN (a PAT with write access to
# the shared jannskiee/homebrew-tap, jannskiee/scoop-bucket, and the
# jannskiee/winget-pkgs fork). These repos are reused across all projects.
on:
  push:
    tags:
      - 'v*'

# No workflow-level grants: the goreleaser job declares the contents: write
# it needs, and any job added later starts from zero permissions.
permissions: {}

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      # Create the GitHub Release and upload its assets.
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # full history + tags needed for changelog and versioning
          # GoReleaser talks to GitHub through GITHUB_TOKEN env, never
          # git-over-HTTP, so the checkout credential must not outlive this step.
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.25'
          # No module cache in the release build: this workflow publishes
          # binaries from a tag push, and a cache entry poisoned by any other
          # workflow would flow straight into the shipped artifacts. Building
          # from source costs a few minutes once per release.
          cache: false

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with Contents write on the shared homebrew-tap, scoop-bucket, and the
          # winget-pkgs fork. Create at Settings > Developer settings > Personal access
          # tokens and add as repo secret TAP_GITHUB_TOKEN. The same PAT/secret pattern is
          # reused by every project that publishes into these shared repos.
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
