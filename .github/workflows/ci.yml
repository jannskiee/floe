name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded runs on PRs; never cancel runs on main
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-lint:
    name: Build & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # Version comes from packageManager in client/package.json
          package_json_file: client/package.json

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: client

      - name: Lint
        run: pnpm lint
        working-directory: client

      - name: Unit tests
        run: pnpm test
        working-directory: client

      - name: Build
        run: pnpm build
        working-directory: client
        env:
          # Use the live signaling server — matches the default in client/.env.example
          NEXT_PUBLIC_SOCKET_URL: https://api.floe.one

  server:
    name: Server (Node.js)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: server

      - name: Test
        run: npm test
        working-directory: server

  cli:
    name: CLI (Go, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      # One OS failing must not hide results from the others
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: cli/go.sum

      - name: Vet
        run: go vet ./...
        working-directory: cli

      - name: Test
        # -count=1 bypasses Go's test-result cache so stability re-runs always execute
        run: go test -count=1 ./...
        working-directory: cli

      - name: Build
        run: go build ./cmd/floe
        working-directory: cli

  e2e:
    name: E2E (browser + CLI interop, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    # Requires both Go (CLI binary) and Node (server + client + Playwright)
    needs: [cli, build-and-lint, server]
    strategy:
      # One OS failing must not hide results from the others
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: cli/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # Version comes from packageManager in client/package.json
          package_json_file: client/package.json

      - name: Get pnpm store directory
        id: pnpm-cache
        # $(...) and $GITHUB_OUTPUT appends are bash-isms; the Windows default
        # shell is pwsh, so pin bash for a portable step.
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Get Playwright browser cache directory
        id: playwright-cache
        shell: bash
        # Default per-OS browser paths: https://playwright.dev/docs/browsers
        run: |
          case "$RUNNER_OS" in
            Linux)   echo "PLAYWRIGHT_CACHE=$HOME/.cache/ms-playwright" >> $GITHUB_OUTPUT ;;
            macOS)   echo "PLAYWRIGHT_CACHE=$HOME/Library/Caches/ms-playwright" >> $GITHUB_OUTPUT ;;
            Windows) echo "PLAYWRIGHT_CACHE=$LOCALAPPDATA/ms-playwright" >> $GITHUB_OUTPUT ;;
            *)       echo "Unknown RUNNER_OS: $RUNNER_OS" >&2; exit 1 ;;
          esac

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ${{ steps.playwright-cache.outputs.PLAYWRIGHT_CACHE }}
          key: ${{ runner.os }}-playwright-${{ hashFiles('client/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install client dependencies
        run: pnpm install --frozen-lockfile
        working-directory: client

      - name: Install server dependencies
        run: npm install
        working-directory: server

      - name: Install Playwright Chromium
        # Always run: on a browser-cache hit the download is skipped anyway,
        # but the Linux system dependencies (--with-deps) still need installing.
        run: pnpm exec playwright install --with-deps chromium
        working-directory: client

      - name: Run E2E tests (browser + CLI interop)
        run: pnpm exec playwright test
        working-directory: client
        env:
          NEXT_PUBLIC_SOCKET_URL: http://localhost:3001

      - name: Upload traces and test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-traces-${{ matrix.os }}
          path: client/test-results/
          if-no-files-found: ignore
          retention-days: 7
