name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-lint:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Lint
        run: npm run lint
        working-directory: client

      - name: Build
        run: npm run build
        working-directory: client
        env:
          # Sentry auth token not required for CI builds (source maps disabled)
          SENTRY_SUPPRESS_TURBOPACK_WARNING: 1
          # Provide dummy values so Next.js doesn't fail on missing env vars
          NEXT_PUBLIC_SOCKET_URL: https://api.floe.one
